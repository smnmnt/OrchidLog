<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#103453">
    <link rel="manifest" href="/manifest.json" type="application/manifest+json">
    <title>PWA check</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6faf8;
            color: #152d3b;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 26px;
        }

        .row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #dce7e0;
        }

        .status {
            font-weight: 700;
        }

        .ok {
            color: #126334;
        }

        .bad {
            color: #9b1c1c;
        }

        .warn {
            color: #8a5a00;
        }

        code {
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>
<main>
    <h1>PWA check</h1>
    <div id="results"></div>
</main>
<script>
    const results = document.getElementById('results');

    function add(label, status, message, tone = 'ok') {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <div class="status ${tone}">${status}</div>
            <div><strong>${label}</strong><br><code>${message}</code></div>
        `;
        results.appendChild(row);
    }

    async function check() {
        add('URL', 'info', location.href, 'warn');
        add('Secure context', window.isSecureContext ? 'ok' : 'fail', String(window.isSecureContext), window.isSecureContext ? 'ok' : 'bad');
        add('Protocol', location.protocol === 'https:' || location.hostname === 'localhost' ? 'ok' : 'fail', location.protocol, location.protocol === 'https:' || location.hostname === 'localhost' ? 'ok' : 'bad');
        add('Standalone mode', matchMedia('(display-mode: standalone)').matches ? 'ok' : 'no', String(matchMedia('(display-mode: standalone)').matches), matchMedia('(display-mode: standalone)').matches ? 'ok' : 'warn');
        add('Service worker support', 'serviceWorker' in navigator ? 'ok' : 'fail', String('serviceWorker' in navigator), 'serviceWorker' in navigator ? 'ok' : 'bad');

        try {
            const manifestResponse = await fetch('/manifest.json', { cache: 'no-store' });
            const manifest = await manifestResponse.json();
            add('Manifest fetch', manifestResponse.ok ? 'ok' : 'fail', `${manifestResponse.status} ${manifest.display || ''} ${manifest.start_url || ''}`, manifestResponse.ok ? 'ok' : 'bad');
        } catch (error) {
            add('Manifest fetch', 'fail', error.message, 'bad');
        }

        try {
            const iconResponse = await fetch('/icons/pwa-192.png', { cache: 'no-store' });
            add('Icon fetch', iconResponse.ok ? 'ok' : 'fail', `${iconResponse.status} ${iconResponse.headers.get('content-type') || ''}`, iconResponse.ok ? 'ok' : 'bad');
        } catch (error) {
            add('Icon fetch', 'fail', error.message, 'bad');
        }

        if ('serviceWorker' in navigator) {
            try {
                const registration = await navigator.serviceWorker.register('/service-worker.js');
                await navigator.serviceWorker.ready;
                add('SW registration', 'ok', registration.scope, 'ok');
                add('SW controller', navigator.serviceWorker.controller ? 'ok' : 'reload', navigator.serviceWorker.controller ? 'active' : 'reload this page once', navigator.serviceWorker.controller ? 'ok' : 'warn');
            } catch (error) {
                add('SW registration', 'fail', error.message, 'bad');
            }
        }
    }

    check();
</script>
</body>
</html>
